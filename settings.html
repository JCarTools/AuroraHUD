<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Aurora · Настройки HUD</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: #0d1118;
      }
      body.settings-body {
        overflow: hidden;
        color: #f3efe7;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      .settings-boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(120% 100% at 100% 0%, rgba(245, 158, 11, 0.12) 0%, transparent 55%),
          radial-gradient(120% 100% at 0% 100%, rgba(73, 88, 125, 0.12) 0%, transparent 55%),
          #0d1118;
      }
      .settings-boot-card {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 18px 22px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        background: rgba(15, 20, 30, 0.78);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      }
      .settings-boot-mark {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        background: #f59e0b;
        box-shadow: 0 0 24px rgba(245, 158, 11, 0.8);
        animation: settingsBootPulse 1.1s ease-in-out infinite;
      }
      .settings-boot-title {
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .settings-boot-sub {
        margin-top: 3px;
        font-size: 12px;
        color: rgba(243, 239, 231, 0.62);
      }
      @keyframes settingsBootPulse {
        0%,
        100% {
          opacity: 0.55;
          transform: scale(0.88);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
    <script>
      // тема до отрисовки — без мигания (auto/light/dark)
      (function () {
        try {
          var p = localStorage.getItem("auroraTheme") || "auto";
          var d = p === "dark" || (p === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", d);
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="./assets/settings-D1xKQ_Ji.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/diag-iubw4oEo.js">
    <link rel="stylesheet" crossorigin href="./assets/diag-D7Xp87Jd.css">
  </head>
  <body class="settings-body">
    <div id="root">
      <div class="settings-boot" role="status" aria-live="polite">
        <div class="settings-boot-card">
          <div class="settings-boot-mark"></div>
          <div>
            <div class="settings-boot-title">Aurora HUD</div>
            <div class="settings-boot-sub">загрузка настроек…</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
